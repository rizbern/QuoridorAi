<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quoridor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="page">

    <h1 class="game-title">Quoridor</h1>

    <div class="game-area">
      <div class="board-outer">
        <div id="board"></div>
        <div class="wall-counters">
          <div class="counter-group top" id="p2-counter"></div>
          <div class="counter-group bottom" id="p1-counter"></div>
        </div>
      </div>
    </div>

    <div class="controls">
      <span class="controls-label">🖱 Click pawn to move &nbsp;·&nbsp; Drag onto board to place a wall</span>
      <span class="status-text" id="status-bar">Loading…</span>
      <button class="ctrl-btn reset" onclick="resetGame()">New Game</button>
    </div>

  </div>

  <div class="overlay" id="overlay">
    <div class="overlay-card">
      <div class="overlay-icon" id="overlay-icon">●</div>
      <h2 class="overlay-title" id="overlay-title">You Win!</h2>
      <p  class="overlay-sub"   id="overlay-sub">Well played!</p>
      <button class="ctrl-btn reset" onclick="resetGame()">Play Again</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
